<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Aashna ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
position:relative;
}

.container{
max-width:500px;
padding:20px;
z-index:5;
}

h1{
font-size:2.8rem;
margin-bottom:10px;
animation:fadeIn 2s;
}

h2{
margin-bottom:20px;
}

.photo{
width:320px;
max-width:90%;
border-radius:25px;
border:4px solid white;
box-shadow:0 0 30px rgba(255,255,255,.5);
margin-bottom:20px;
}

#message{
font-size:20px;
margin-bottom:20px;
font-weight:bold;
}

.buttons{
position:relative;
height:140px;
}

button{
border:none;
padding:16px 35px;
font-size:24px;
border-radius:50px;
cursor:pointer;
transition:.3s;
}

#yesBtn{
background:#28a745;
color:white;
}

#noBtn{
background:#dc3545;
color:white;
position:absolute;
margin-left:20px;
}

.heart{
position:absolute;
font-size:24px;
animation:float linear infinite;
opacity:.8;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-120px);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.finalScreen{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff4d6d,#ff758f);
padding:20px;
text-align:center;
}

.finalScreen img{
width:280px;
border-radius:20px;
border:4px solid white;
margin:20px;
box-shadow:0 0 20px rgba(255,255,255,.5);
}

.finalScreen h1{
font-size:3rem;
}

.footer{
margin-top:20px;
font-size:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Hey Aashna ❤️</h1>

<h2>Will You Be My Better Half? 💕</h2>

<img src="couple.jpg" class="photo">

<p id="message">I have something important to ask you 🥹</p>

<div class="buttons">
<button id="yesBtn">YES ❤️</button>
<button id="noBtn">NO 😜</button>
</div>

</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const message = document.getElementById("message");

let scale = 1;

const texts = [
"Are you sure? 🥺",
"Think again 😘",
"The NO button seems broken 😜",
"My heart says YES ❤️",
"Wrong answer detected 🚨",
"Please don't break my heart 💔",
"Destiny says YES 💕",
"Try again 😏"
];

let count = 0;

function moveButton(){

const x = Math.random() * (window.innerWidth - 150);
const y = Math.random() * (window.innerHeight - 120);

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

message.innerHTML = texts[count % texts.length];

scale += 0.15;
yesBtn.style.transform = `scale(${scale})`;

count++;
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

yesBtn.addEventListener("click", function(){

document.body.innerHTML = `

<div class="finalScreen">

<h1>❤️ AASHNA SAID YES ❤️</h1>

<img src="couple.jpg">

<h2>
You just made me the happiest man alive.
</h2>

<h2>
I promise to love, support and annoy you forever ❤️
</h2>

<div class="footer">
Forever Yours,<br>
<b>Srikanth ❤️</b>
</div>

<h1 style="margin-top:20px;">💍✨🥂❤️</h1>

</div>

`;

for(let i=0;i<300;i++){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.style.position="absolute";
heart.style.left=Math.random()*100+"vw";
heart.style.top=Math.random()*100+"vh";
heart.style.fontSize=(Math.random()*40+15)+"px";

document.body.appendChild(heart);
}

});

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*6+4)+"s";
heart.style.fontSize=(Math.random()*25+15)+"px";

document.body.appendChild(heart);
}

</script>

</body>
</html>
