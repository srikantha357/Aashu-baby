<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aashna ❤️ Srikanth</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff758c,#ff7eb3);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
position:relative;
}

.container{
max-width:500px;
padding:20px;
z-index:10;
}

h1{
font-size:2.7rem;
margin-bottom:10px;
}

h2{
margin-bottom:15px;
}

.photo{
width:320px;
max-width:90%;
border-radius:25px;
border:4px solid white;
box-shadow:0 0 20px rgba(255,255,255,.5);
margin-bottom:20px;
}

#message{
font-size:20px;
font-weight:bold;
min-height:60px;
margin-bottom:20px;
}

.buttons{
position:relative;
height:180px;
}

button{
padding:16px 35px;
font-size:24px;
border:none;
border-radius:50px;
cursor:pointer;
transition:.3s;
}

#yesBtn{
background:#28a745;
color:white;
}

#noBtn{
background:#dc3545;
color:white;
position:absolute;
margin-left:15px;
}

.heart{
position:absolute;
animation:float linear infinite;
opacity:.6;
pointer-events:none;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-120px);
}
}

.finalScreen{
height:100vh;
width:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(135deg,#ff4d6d,#ff758f);
text-align:center;
}

.finalScreen img{
width:300px;
max-width:90%;
border-radius:20px;
border:4px solid white;
margin:20px;
box-shadow:0 0 25px rgba(255,255,255,.6);
}

.footer{
font-size:24px;
margin-top:20px;
}

.ring{
font-size:70px;
animation:bounce 1s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

</style>
</head>

<body>

<div class="container">

<h1>❤️ Hey Aashna ❤️</h1>

<h2>Will You Be My Better Half? 💕</h2>

<img src="couple.JPG" class="photo">

<p id="message">
From the day I met you, life became more beautiful ❤️
</p>

<div class="buttons">
<button id="yesBtn">YES ❤️</button>
<button id="noBtn">NO 😜</button>
</div>

</div>

<script>

const noBtn=document.getElementById("noBtn");
const yesBtn=document.getElementById("yesBtn");
const message=document.getElementById("message");

let scale=1;

const messages=[
"Are you sure? 🥺",
"Please think again ❤️",
"No isn't an option today 😜",
"Try clicking YES instead 😘",
"My heart says YES ❤️",
"The NO button seems broken 😂",
"Come on Aashna 😭",
"Don't break Srikanth's heart 💔",
"You know you want to click YES 😏",
"Destiny says YES 💕",
"Wrong answer detected 🚨",
"Still trying? 😂",
"Nice try, but NO won't work 😜",
"Forever sounds better ❤️",
"Last chance to click YES 😘",
"You're too cute to say NO 🥰",
"Error 404: NO not found 😜"
];

function moveButton(){

const x=Math.random()*(window.innerWidth-140);
const y=Math.random()*(window.innerHeight-140);

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

message.innerHTML=
messages[Math.floor(Math.random()*messages.length)];

scale+=0.25;
yesBtn.style.transform=`scale(${scale})`;

}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("click",moveButton);
noBtn.addEventListener("touchstart",moveButton);

yesBtn.addEventListener("click",()=>{

document.body.innerHTML=`

<div class="finalScreen">

<h1>❤️ AASHNA SAID YES ❤️</h1>

<img src="couple.JPG">

<h2>
You just made me the happiest man alive.
</h2>

<h2>
I promise to love, support and annoy you forever ❤️
</h2>

<div class="ring">💍</div>

<div class="footer">
Forever Yours,<br>
<b>Srikanth ❤️</b>
</div>

</div>

`;

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.innerHTML=["❤️","💕","💖","💘"][Math.floor(Math.random()*4)];

heart.style.position="absolute";
heart.style.left=Math.random()*100+"vw";
heart.style.top=Math.random()*100+"vh";
heart.style.fontSize=(Math.random()*30+15)+"px";

document.body.appendChild(heart);
}

});

for(let i=0;i<12;i++){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*8+8)+"s";
heart.style.fontSize=(Math.random()*20+15)+"px";

document.body.appendChild(heart);

}

</script>

</body>
</html>
